<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validador de Billetes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="card">

    <h2>Validador de Billetes - Serie B - Sólo Bs. 10, 20 y 50</h2>

    <label for="serie">Número de serie</label>
    <input type="number" id="serie" placeholder="Ej. 12345678">

    <label for="corte">Denominación</label>
    <div class="select-wrapper">
      <select id="corte">
        <option value="Bs10">Bs 10</option>
        <option value="Bs20">Bs 20</option>
        <option value="Bs50">Bs 50</option>
      </select>
    </div>

    <button onclick="validar()">Validar</button>

    <p id="resultado"></p>

    <p class="nota">Uso gratuito. Realizado por Oliver Laura S.</p>

  </div>

  <script src="app.js"></script>
</body>
</html>
