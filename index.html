<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validador de Billetes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>Validador de Billetes - Por: Oliver Laura</h2>

  <input type="number" id="serie" placeholder="Número de serie">

  <select id="corte">
    <option value="Bs10">Bs 10</option>
    <option value="Bs20">Bs 20</option>
    <option value="Bs50">Bs 50</option>
  </select>

  <button onclick="validar()">Validar</button>

  <p id="resultado"></p>

  <p class="nota">Uso informativo. No reemplaza validación oficial.</p>

  <script src="app.js"></script>
</body>
</html>
